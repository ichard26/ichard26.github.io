# TODO: maybe one day improve JSON-LD metadata (it's pretty complicated)
# https://code.luasoftware.com/tutorials/hugo/schema-markup-for-hugo/

title = "Richard Si"
site = { language = { locale = "en-ca" }}
defaultContentLanguage = "en-ca"
timeZone = "America/Toronto"

baseURL = 'https://sichard.ca/'
enableGitInfo = true
enableRobotsTXT = true

[module]
imports = [
    { path = "github.com/imfing/hextra" }
]

[frontmatter]
date = ["date", ":filename"]
publishDate = ["publishDate", "date", ":filename"]
lastmod = ["lastmod"]

[permalinks]
blog = "blog/:year/:month/:slug/"

[params]
description = "A place for Richard Si (@ichard26) to ramble about Python and open-source software."
env = "development"
keywords = ["blog", "python", "oss", "foss", "pip"]

displayUpdatedDate = true
dateFormat = "January 2, 2006"
# externalLinkDecoration = true

[params.navbar]
displayTitle = true
displayLogo = true
logo = { path = "favicon.svg" }

[params.toc]
displayTags = true

[params.footer]
displayCopyright = true

[params.schema]
publisherType = "Person"
sameAs = [
  "https://github.com/ichard26",
  "https://twitter.com/sichard26",
  "https://discuss.python.org/u/ichard26/summary",
  "https://stackoverflow.com/users/18155471/ichard26",
  "https://www.reddit.com/user/ichard26",
  "https://pypi.org/user/ichard26/",
  "https://readthedocs.org/profiles/ichard26/",
]

[taxonomies]
  tag = 'tags'

# Site-wide navigation
[[menu.main]]
weight = 1
identifier = "about"
name = "about"
url = "/about/"

[[menu.main]]
weight = 2
identifier = "writing"
name = "writing"
url = "/blog/"

[[menu.main]]
weight = 3
identifier = "privacy"
name = "privacy"
url = "/privacy/"

[[menu.main]]
weight = 4
name = "Next PR Number ➚"
url = "https://sichard.ca/next-pr-number/"
params = { type = "link", icon = "clipboard-copy" }

[[menu.main]]
weight = 5
name = "GitHub"
url = "https://github.com/ichard26"
params = { icon = "github" }

[[menu.main]]
weight = 6
name = "LinkedIn"
url = "https://www.linkedin.com/in/richard-si-840582373/"
params = { icon = "linkedin" }

# Allow HTML in my content pages.
[markup.goldmark.renderer]
unsafe = true

[markup.highlight]
noClasses = false
